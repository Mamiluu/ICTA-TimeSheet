services:
  - type: web
    name: icta-attendance
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: GMAIL_SENDER_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
