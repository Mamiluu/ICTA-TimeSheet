<meta charset="UTF-8">
<title>ICT Authority — Forgot Password</title>
<link rel="stylesheet" href="assets/theme.css">
<style>
  body{ justify-content:center; min-height:100vh; }
</style>

<div class="sheet">
  <h1 class="title">Forgot your password?</h1>
  <p class="sub">Enter your admin email and we'll send you a link to set a new password.</p>

  <label for="email">Email</label>
  <input type="email" id="email" autocomplete="username" placeholder="you@example.com">

  <button class="primary" id="sendBtn" style="width:100%;">Send reset link</button>
  <p class="notice" id="formNotice" style="display:none;"></p>

  <p style="margin-top:16px;"><a href="login.html">Back to login</a></p>
</div>
<p class="footer-note">© 2026 Asya Hafidh. All rights reserved.</p>

<script src="assets/api.js"></script>
<script>
(function(){
  var email = document.getElementById('email');
  var sendBtn = document.getElementById('sendBtn');
  var formNotice = document.getElementById('formNotice');

  function submit(){
    var e = email.value.trim();
    formNotice.style.display = 'none';
    if(!e) return;

    sendBtn.disabled = true;
    API.post('/api/auth/forgot-password', { email: e }).then(function(r){
      // Deliberately the same message regardless of outcome -- the backend
      // never reveals whether an email has an account (see server/src/routes/auth.js).
      formNotice.className = 'notice ok';
      formNotice.textContent = (r.data && r.data.message) || 'If that email has an account, a reset link is on its way.';
      formNotice.style.display = '';
      sendBtn.disabled = false;
    }).catch(function(){
      formNotice.className = 'notice error';
      formNotice.textContent = 'Network error — could not reach the backend.';
      formNotice.style.display = '';
      sendBtn.disabled = false;
    });
  }

  sendBtn.addEventListener('click', submit);
  email.addEventListener('keydown', function(e){ if(e.key === 'Enter') submit(); });
})();
</script>
