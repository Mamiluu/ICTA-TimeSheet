<meta charset="UTF-8">
<title>ICT Authority — Admin Login</title>
<link rel="stylesheet" href="assets/theme.css">
<style>
  body{ justify-content:center; min-height:100vh; }
  .links{ display:flex; justify-content:space-between; font-size:12.5px; margin-top:6px; }
</style>

<div class="sheet" id="loginPanel">
  <h1 class="title">ICT Authority — Admin Login</h1>
  <p class="sub">Sign in with your admin email and password.</p>

  <label for="email">Email</label>
  <input type="email" id="email" autocomplete="username" placeholder="you@example.com">

  <label for="password">Password</label>
  <input type="password" id="password" autocomplete="current-password" placeholder="Password">

  <button class="primary" id="loginBtn" style="width:100%;">Log in</button>
  <p class="error" id="loginError" style="display:none;"></p>

  <div class="links">
    <a href="forgot-password.html">Forgot password?</a>
  </div>
</div>
<p class="footer-note">© 2026 Asya Hafidh. All rights reserved.</p>

<script src="assets/api.js"></script>
<script>
(function(){
  var email = document.getElementById('email');
  var password = document.getElementById('password');
  var loginBtn = document.getElementById('loginBtn');
  var loginError = document.getElementById('loginError');

  function redirectFor(role){
    location.href = role === 'SUPER_ADMIN' ? 'superadmin.html' : 'admin.html';
  }

  // If already logged in, skip the form entirely.
  API.get('/api/auth/me').then(function(r){
    if(r.status === 200 && r.data.ok) redirectFor(r.data.user.role);
  });

  function submit(){
    var e = email.value.trim(), p = password.value;
    loginError.style.display = 'none';
    if(!e || !p){
      loginError.textContent = 'Enter your email and password.';
      loginError.style.display = '';
      return;
    }
    loginBtn.disabled = true;
    API.post('/api/auth/login', { email: e, password: p }).then(function(r){
      if(r.status === 200 && r.data.ok) return redirectFor(r.data.user.role);
      loginBtn.disabled = false;
      if(r.status === 429){
        loginError.textContent = r.data.message || 'Too many attempts. Try again later.';
      } else {
        loginError.textContent = 'Incorrect email or password.';
      }
      loginError.style.display = '';
    }).catch(function(){
      loginBtn.disabled = false;
      loginError.textContent = 'Network error — could not reach the backend.';
      loginError.style.display = '';
    });
  }

  loginBtn.addEventListener('click', submit);
  password.addEventListener('keydown', function(e){ if(e.key === 'Enter') submit(); });
})();
</script>
